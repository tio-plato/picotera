[tools]
"aqua:pressly/goose" = "latest"
go = "latest"
node = "latest"
oapi-codegen = "latest"
pnpm = "latest"
sqlc = "latest"

[env]
_.file = [".env.default", { path = ".env", optional = true }]
PICOTERA_LLMBRIDGE_PLUGIN_PATH = "{{ config_root }}/dist/picotera-llmbridge-plugin"
GOOSE_MIGRATION_DIR = "{{ config_root }}/db/migrations"
GOOSE_DRIVER = "postgres"
GOOSE_DBSTRING = "{{ env.PICOTERA_DATABASE_URL }}"

[tasks.server]
run = "go run ./cmd/picotera/main.go"
depends = "llmbridge-plugin"

[tasks.web]
run = "pnpm dev"
dir = "dashboard"

[tasks.openapi]
run = "go run ./cmd/picotera/main.go openapi > openapi.yaml"

[tasks.llmbridge-plugin]
run = "mkdir -p dist && go build -o dist/picotera-llmbridge-plugin ./cmd/picotera-llmbridge-plugin"
sources = [ "cmd/picotera-llmbridge-plugin", "pkg/llmbridge", "pkg/llmbridgeimpl", "third_party/axonhub/llm" ]
outputs = [ "dist/picotera-llmbridge-plugin" ]
