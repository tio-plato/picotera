[tools]
"aqua:pressly/goose" = "latest"
go = "latest"
node = "latest"
oapi-codegen = "latest"
pnpm = "latest"
sqlc = "latest"
tinygo = "0.41.1"

[env]
_.file = [".env.default", { path = ".env", optional = true }]
PICOTERA_LLMBRIDGE_WASM_PATH = "{{ config_root }}/dist/llmbridge.wasm"
GOOSE_MIGRATION_DIR = "{{ config_root }}/db/migrations"
GOOSE_DRIVER = "postgres"
GOOSE_DBSTRING = "{{ env.PICOTERA_DATABASE_URL }}"

[tasks.server]
run = "go run ./cmd/picotera/main.go"
depends = "wasm"

[tasks.web]
run = "pnpm dev"
dir = "dashboard"

[tasks.openapi]
run = "go run ./cmd/picotera/main.go openapi > openapi.yaml"

[tasks.wasm]
run = "mkdir -p dist && tinygo build -tags tinygo -target=wasi -scheduler=none -panic=print -opt=z -buildmode=c-shared -o dist/llmbridge.wasm ./cmd/llmbridge-wasm"
sources = [ "cmd/llmbridge-wasm", "pkg/llmbridge", "pkg/llmbridgeimpl", "third_party/axonhub/llm" ]
outputs = [ "dist/llmbridge.wasm" ]

[tasks.precompile-wasm]
run = "go run ./cmd/picotera/main.go precompile-llmbridge-wasm"
depends = "wasm"
