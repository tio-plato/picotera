        - id
        - parentSpanId
        - metaRequestCount
        - upstreamRequestCount
        - totalTokens
        - inputTokens
        - cacheReadTokens
        - outputTokens
        - cacheWriteTokens
        - cacheWrite1hTokens
        - modelCosts
      type: object
    RequestView:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/RequestView.json
          format: uri
          readOnly: true
          type: string
        apiKeyId:
          format: int32
          type: integer
        cacheReadTokens:
          format: int32
          type: integer
        cacheWrite1hTokens:
          format: int32
          type: integer
        cacheWriteTokens:
          format: int32
          type: integer
        createdAt:
          type: string
        endpointPath:
          type: string
        errorMessage:
          type: string
        finishReason:
          format: int32
          type: integer
        id:
          type: string
        inputTokens:
          format: int32
          type: integer
        model:
          type: string
        modelCost:
          format: double
          type: number
        modelCostCurrency:
          type: string
        outputTokens:
          format: int32
          type: integer
        parentSpanId:
          type: string
        projectId:
          format: int32
          type: integer
        providerId:
          format: int32
          type: integer
        requestArtifactUrl:
          type: string
        responseArtifactUrl:
          type: string
        spanId:
          type: string
        status:
          format: int32
          type: integer
        statusCode:
          format: int32
          type: integer
        timeSpentMs:
          format: int32
          type: integer
        ttftMs:
          format: int32
          type: integer
        type:
          format: int32
          type: integer
        upstreamModel:
          type: string
        userMessagePreview:
          type: string
      required:
        - id
        - type
        - status
      type: object
    ScriptMutateBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/ScriptMutateBody.json
          format: uri
          readOnly: true
          type: string
        enabled:
          type: boolean
        name:
          type: string
        source:
          type: string
      required:
        - name
        - source
        - enabled
      type: object
    ScriptView:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/ScriptView.json
          format: uri
          readOnly: true
          type: string
        createdAt:
          type: string
        enabled:
          type: boolean
        id:
          type: string
        name:
          type: string
        source:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - source
        - enabled
        - createdAt
        - updatedAt
      type: object
    SimulateCandidate:
      additionalProperties: false
      properties:
        bridged:
          type: boolean
        mergedAnnotations:
          additionalProperties:
            type: string
          type: object
        mpe:
          $ref: "#/components/schemas/SimulateMPE"
        outboundProfile:
          $ref: "#/components/schemas/SimulateOutboundProfile"
        provider:
          $ref: "#/components/schemas/SimulateProviderSummary"
        upstreamFormat:
          type: string
      required:
        - provider
        - mpe
        - mergedAnnotations
        - upstreamFormat
        - bridged
      type: object
    SimulateDispatchRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/SimulateDispatchRequestBody.json
          format: uri
          readOnly: true
          type: string
        apiKeyId:
          format: int32
          minimum: 1
          type: integer
        body:
          description: Raw JSON request body string. Empty allowed (body omitted from hook context).
          type: string
        endpoint:
          $ref: "#/components/schemas/SimulateEndpointSelector"
        model:
          minLength: 1
          type: string
        pathVars:
          additionalProperties:
            type: string
          description: Optional path variable map (used when the endpoint path contains {name} tokens).
          type: object
      required:
        - endpoint
        - apiKeyId
        - model
        - body
      type: object
    SimulateDispatchResponseBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/SimulateDispatchResponseBody.json
          format: uri
          readOnly: true
          type: string
        candidates:
          items:
            $ref: "#/components/schemas/SimulateCandidate"
          nullable: true
          type: array
        logs:
          items:
            $ref: "#/components/schemas/SimulateLogEntry"
          nullable: true
          type: array
        originalModel:
          type: string
        resolvedModel:
          type: string
        sourceFormat:
          type: string
        stream:
          type: boolean
      required:
        - originalModel
        - resolvedModel
        - sourceFormat
        - stream
        - candidates
        - logs
      type: object
    SimulateEndpointSelector:
      additionalProperties: false
      properties:
        format:
          description: Unified source format; required when kind==unified.
          enum:
            - anthropicMessages
            - openaiChatCompletions
            - openaiResponses
            - geminiGenerateContent
            - geminiStreamGenerateContent
          type: string
        kind:
          description: "\"path\" picks a configured endpoint row; \"unified\" picks one of the five unified routes."
          enum:
            - path
            - unified
          type: string
        path:
          description: Endpoint path; required when kind==path.
          type: string
      required:
        - kind
      type: object
    SimulateLogEntry:
      additionalProperties: false
      properties:
        level:
          type: string
        message:
          type: string
        ts:
          type: string
      required:
        - level
        - message
        - ts
      type: object
    SimulateMPE:
      additionalProperties: false
      properties:
        annotations:
          additionalProperties:
            type: string
          type: object
        endpointPath:
          type: string
        modelName:
          type: string
        priority:
          format: int32
          type: integer
        providerId:
          format: int32
          type: integer
        upstreamModelName:
          type: string
      required:
        - modelName
        - providerId
        - endpointPath
        - upstreamModelName
        - priority
        - annotations
      type: object
    SimulateOutboundProfile:
      additionalProperties: false
      properties:
        config:
          additionalProperties: {}
          type: object
        type:
          type: string
      required:
        - type
        - config
      type: object
    SimulateProviderSummary:
      additionalProperties: false
      properties:
        annotations:
          additionalProperties:
            type: string
          type: object
        disabled:
          type: boolean
        id:
          format: int32
          type: integer
        name:
          type: string
        priority:
          format: int32
          type: integer
      required:
        - id
        - name
        - priority
        - annotations
        - disabled
      type: object
    TraceCostView:
      additionalProperties: false
      properties:
        amount:
          format: double
          type: number
        currency:
          type: string
      required:
        - currency
        - amount
      type: object
    UpdateProviderModelsRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/UpdateProviderModelsRequestBody.json
          format: uri
          readOnly: true
          type: string
        providerModels:
          items:
            $ref: "#/components/schemas/ProviderModelEntry"
          nullable: true
          type: array
      required:
        - providerModels
      type: object
    UpsertGlobalSettingRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/UpsertGlobalSettingRequestBody.json
          format: uri
          readOnly: true
          type: string
        key:
          type: string
        value: {}
      required:
        - key
        - value
      type: object
    UpsertProjectRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/UpsertProjectRequestBody.json
          format: uri
          readOnly: true
          type: string
        id:
          format: int32
          type: integer
        name:
          type: string
        paths:
          items:
            type: string
          nullable: true
          type: array
      required:
        - name
        - paths
      type: object
    UpsertProviderRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/UpsertProviderRequestBody.json
          format: uri
          readOnly: true
          type: string
        annotations:
          additionalProperties:
            type: string
          type: object
        credentials:
          type: string
        disabled:
          type: boolean
        id:
          format: int32
          type: integer
        modelsEndpointResolver:
          enum:
            - unknown
            - generalApiKey
            - bearerToken
            - xApiKey
            - searchKey
            - googApiKey
          type: string
        modelsEndpointUrl:
          type: string
        name:
          type: string
        priority:
          format: int32
          type: integer
        providerModels:
          items:
            $ref: "#/components/schemas/ProviderModelEntry"
          nullable: true
          type: array
        proxyUrl:
          type: string
        supportsNativeWebSearch:
          type: boolean
      required:
        - name
        - credentials
        - priority
        - providerModels
        - annotations
        - disabled
        - supportsNativeWebSearch
      type: object
info:
  title: PicoTera Management API
  version: 1.0.0
openapi: 3.0.3
paths:
  /api/picotera/api-keys:
    get:
      operationId: listApiKeys
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ApiKeyView"
                nullable: true
                type: array
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: List all API keys
    post:
      operationId: createApiKey
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyMutateBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Create an API key
  /api/picotera/api-keys/delete:
    post:
      operationId: deleteApiKey
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteApiKeyRequestBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Delete an API key
  /api/picotera/api-keys/{id}:
    get:
      operationId: getApiKey
      parameters:
        - in: path
          name: id
          required: true
          schema:
            format: int32
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Get an API key
    put:
      operationId: updateApiKey
      parameters:
        - in: path
          name: id
          required: true
          schema:
            format: int32
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyMutateBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Update an API key
  /api/picotera/endpoints:
    get:
      operationId: listEndpoints
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/EndpointView"
                nullable: true
                type: array
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: List all endpoints
    put:
      operationId: upsertEndpoint
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EndpointView"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndpointView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Upsert an endpoint
  /api/picotera/endpoints/delete:
    post:
      operationId: deleteEndpoint
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteEndpointRequestBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Delete an endpoint
  /api/picotera/exchange-rates:
    get:
      operationId: listExchangeRates
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ExchangeRateView"
                nullable: true
                type: array
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: List all exchange rates
    put:
      operationId: putExchangeRate
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExchangeRateView"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRateView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Upsert an exchange rate
  /api/picotera/exchange-rates/delete:
    post:
      operationId: deleteExchangeRate
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteExchangeRateRequestBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Delete an exchange rate
  /api/picotera/exchange-rates/{code}:
    get:
      operationId: getExchangeRate
      parameters:
        - in: path
          name: code
          required: true
          schema:
            example: USD
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRateView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Get an exchange rate by code
  /api/picotera/kv:
    get:
      operationId: listKvEntries
      parameters:
        - explode: false
          in: query
          name: pattern
          schema:
            default: "*"
            type: string
        - explode: false
          in: query
          name: cursor
          schema:
            format: int64
            minimum: 0
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBodyKvEntryView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: List KV entries
  /api/picotera/kv/delete:
    post:
      operationId: deleteKvEntry
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteKvEntryRequestBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Delete a KV entry
  /api/picotera/kv/{key}:
    get:
      operationId: getKvEntry
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KvEntryView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Get a KV entry
    put:
      operationId: upsertKvEntry
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KvMutateBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KvEntryView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Create or update a KV entry
  /api/picotera/models:
    get:
      operationId: listModels
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ModelView"
                nullable: true
                type: array
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: List all models
    put:
      operationId: putModel
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelView"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Upsert a model
  /api/picotera/models/delete:
    post:
      operationId: deleteModel
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteModelRequestBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Delete a model
  /api/picotera/models/{name}:
    get:
      operationId: getModel
      parameters:
        - in: path
          name: name
          required: true
          schema:
            example: gpt-4o
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelView"
          description: OK
        default:
