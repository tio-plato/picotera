components:
  schemas:
    CreateProviderRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/CreateProviderRequestBody.json
          format: uri
          readOnly: true
          type: string
        annotations:
          additionalProperties:
            type: string
          type: object
        credentials:
          type: string
        disabled:
          type: boolean
        name:
          type: string
        priority:
          format: int32
          type: integer
        providerModels:
          additionalProperties:
            $ref: "#/components/schemas/ProviderModelEntry"
          type: object
      required:
        - name
        - credentials
        - priority
        - providerModels
        - annotations
        - disabled
      type: object
    DeleteEndpointRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/DeleteEndpointRequestBody.json
          format: uri
          readOnly: true
          type: string
        path:
          type: string
      required:
        - path
      type: object
    DeleteModelRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/DeleteModelRequestBody.json
          format: uri
          readOnly: true
          type: string
        name:
          type: string
      required:
        - name
      type: object
    DeleteProviderEndpointRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/DeleteProviderEndpointRequestBody.json
          format: uri
          readOnly: true
          type: string
        endpointPath:
          type: string
        providerId:
          format: int32
          type: integer
      required:
        - providerId
        - endpointPath
      type: object
    DeleteProviderRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/DeleteProviderRequestBody.json
          format: uri
          readOnly: true
          type: string
        id:
          format: int32
          type: integer
      required:
        - id
      type: object
    DeleteScriptRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/DeleteScriptRequestBody.json
          format: uri
          readOnly: true
          type: string
        id:
          type: string
      required:
        - id
      type: object
    EndpointView:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/EndpointView.json
          format: uri
          readOnly: true
          type: string
        credentialsResolver:
          enum:
            - generalApiKey
            - bearerToken
            - xApiKey
            - unknown
          type: string
        modelPath:
          type: string
        name:
          type: string
        path:
          type: string
      required:
        - name
        - path
        - modelPath
        - credentialsResolver
      type: object
    FetchModelsRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/FetchModelsRequestBody.json
          format: uri
          readOnly: true
          type: string
        endpointPath:
          type: string
        providerId:
          format: int32
          type: integer
      required:
        - providerId
        - endpointPath
      type: object
    FetchModelsResponseBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/FetchModelsResponseBody.json
          format: uri
          readOnly: true
          type: string
        models:
          items:
            type: string
          nullable: true
          type: array
        providerId:
          format: int32
          type: integer
      required:
        - providerId
        - models
      type: object
    ModelView:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/ModelView.json
          format: uri
          readOnly: true
          type: string
        developer:
          type: string
        disabled:
          type: boolean
        name:
          type: string
        series:
          type: string
        title:
          type: string
      required:
        - name
        - title
        - developer
        - series
        - disabled
      type: object
    PaginatedBodyRequestView:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/PaginatedBodyRequestView.json
          format: uri
          readOnly: true
          type: string
        items:
          items:
            $ref: "#/components/schemas/RequestView"
          nullable: true
          type: array
        pagination:
          $ref: "#/components/schemas/PaginationInfo"
      required:
        - items
        - pagination
      type: object
    PaginationInfo:
      additionalProperties: false
      properties:
        hasMore:
          type: boolean
        nextCursor:
          type: string
      required:
        - hasMore
      type: object
    PicoTeraError:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/PicoTeraError.json
          format: uri
          readOnly: true
          type: string
        code:
          type: string
        details:
          items:
            type: string
          nullable: true
          type: array
        message:
          type: string
      required:
        - message
        - code
        - details
      type: object
    ProviderEndpointView:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/ProviderEndpointView.json
          format: uri
          readOnly: true
          type: string
        endpointPath:
          type: string
        providerId:
          format: int32
          type: integer
        upstreamUrl:
          type: string
      required:
        - providerId
        - endpointPath
        - upstreamUrl
      type: object
    ProviderModelEntry:
      additionalProperties: false
      properties:
        annotations:
          additionalProperties:
            type: string
          type: object
        disabled:
          type: boolean
        endpoints:
          items:
            type: string
          nullable: true
          type: array
        priority:
          format: int32
          type: integer
        upstreamModelName:
          type: string
      type: object
    ProviderView:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/ProviderView.json
          format: uri
          readOnly: true
          type: string
        annotations:
          additionalProperties:
            type: string
          type: object
        credentials:
          type: string
        disabled:
          type: boolean
        id:
          format: int32
          type: integer
        name:
          type: string
        priority:
          format: int32
          type: integer
        providerModels:
          additionalProperties:
            $ref: "#/components/schemas/ProviderModelEntry"
          type: object
      required:
        - id
        - name
        - credentials
        - priority
        - providerModels
        - annotations
        - disabled
      type: object
    RequestView:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/RequestView.json
          format: uri
          readOnly: true
          type: string
        apiKeyId:
          format: int32
          type: integer
        cacheReadTokens:
          format: int32
          type: integer
        cacheWriteTokens:
          format: int32
          type: integer
        createdAt:
          type: string
        endpointPath:
          type: string
        errorMessage:
          type: string
        id:
          type: string
        inputTokens:
          format: int32
          type: integer
        model:
          type: string
        outputTokens:
          format: int32
          type: integer
        parentSpanId:
          type: string
        providerId:
          format: int32
          type: integer
        requestArtifactUrl:
          type: string
        responseArtifactUrl:
          type: string
        spanId:
          type: string
        status:
          format: int32
          type: integer
        statusCode:
          format: int32
          type: integer
        timeSpentMs:
          format: int32
          type: integer
        ttftMs:
          format: int32
          type: integer
        type:
          format: int32
          type: integer
        upstreamModel:
          type: string
      required:
        - id
        - type
        - status
      type: object
    ScriptMutateBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/ScriptMutateBody.json
          format: uri
          readOnly: true
          type: string
        enabled:
          type: boolean
        name:
          type: string
        source:
          type: string
      required:
        - name
        - source
        - enabled
      type: object
    ScriptView:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/ScriptView.json
          format: uri
          readOnly: true
          type: string
        createdAt:
          type: string
        enabled:
          type: boolean
        id:
          type: string
        name:
          type: string
        source:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - source
        - enabled
        - createdAt
        - updatedAt
      type: object
    UpsertProviderRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/UpsertProviderRequestBody.json
          format: uri
          readOnly: true
          type: string
        annotations:
          additionalProperties:
            type: string
          type: object
        credentials:
          type: string
        disabled:
          type: boolean
        id:
          format: int32
          type: integer
        name:
          type: string
        priority:
          format: int32
          type: integer
        providerModels:
          additionalProperties:
            $ref: "#/components/schemas/ProviderModelEntry"
          type: object
      required:
        - name
        - credentials
        - priority
        - providerModels
        - annotations
        - disabled
      type: object
info:
  title: PicoTera Management API
  version: 1.0.0
openapi: 3.0.3
paths:
  /api/picotera/endpoints:
    get:
      operationId: listEndpoints
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/EndpointView"
                nullable: true
                type: array
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: List all endpoints
    put:
      operationId: upsertEndpoint
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EndpointView"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndpointView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Upsert an endpoint
  /api/picotera/endpoints/delete:
    post:
      operationId: deleteEndpoint
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteEndpointRequestBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Delete an endpoint
  /api/picotera/models:
    get:
      operationId: listModels
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ModelView"
                nullable: true
                type: array
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: List all models
    put:
      operationId: putModel
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelView"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Upsert a model
  /api/picotera/models/delete:
    post:
      operationId: deleteModel
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteModelRequestBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Delete a model
  /api/picotera/models/{name}:
    get:
      operationId: getModel
      parameters:
        - in: path
          name: name
          required: true
          schema:
            example: gpt-4o
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Get a model by name
  /api/picotera/provider-endpoints:
    get:
      operationId: listProviderEndpoints
      parameters:
        - explode: false
          in: query
          name: providerId
          schema:
            format: int32
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ProviderEndpointView"
                nullable: true
                type: array
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: List provider endpoints
    put:
      operationId: upsertProviderEndpoint
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderEndpointView"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderEndpointView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Upsert a provider endpoint
  /api/picotera/provider-endpoints/delete:
    post:
      operationId: deleteProviderEndpoint
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteProviderEndpointRequestBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Delete a provider endpoint
  /api/picotera/provider-endpoints/fetch-models:
    post:
      operationId: fetchModels
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FetchModelsRequestBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchModelsResponseBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Fetch model list from upstream provider
  /api/picotera/providers:
    get:
      operationId: listProviders
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ProviderView"
                nullable: true
                type: array
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: List all providers
    post:
      operationId: createProvider
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderRequestBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Create a new provider
    put:
      operationId: upsertProvider
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertProviderRequestBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Upsert a provider
  /api/picotera/providers/delete:
    post:
      operationId: deleteProvider
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteProviderRequestBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Delete a provider
  /api/picotera/providers/{id}:
    get:
      operationId: getProvider
      parameters:
        - in: path
          name: id
          required: true
          schema:
            example: 1
            format: int32
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Get a provider by ID
  /api/picotera/requests:
    get:
      operationId: listRequests
      parameters:
        - explode: false
          in: query
          name: limit
          schema:
            default: 20
            example: 20
            format: int32
            maximum: 100
            minimum: 1
            type: integer
        - explode: false
          in: query
          name: cursor
          schema:
            example: eyJpZCI6MX0=
            type: string
        - explode: false
          in: query
          name: type
          schema:
            default: -1
            format: int32
            type: integer
        - explode: false
          in: query
          name: providerId
          schema:
            format: int32
            type: integer
        - explode: false
          in: query
          name: endpointPath
          schema:
            type: string
        - explode: false
          in: query
          name: model
          schema:
            type: string
        - explode: false
          in: query
          name: upstreamModel
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBodyRequestView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: List requests
  /api/picotera/requests/{id}:
    get:
      operationId: getRequest
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Get a request by ID
  /api/picotera/requests/{id}/spans:
    get:
      operationId: listRequestSpans
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/RequestView"
                nullable: true
                type: array
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: List spans (meta + upstream) related to a request
  /api/picotera/scripts:
    get:
      operationId: listScripts
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ScriptView"
                nullable: true
                type: array
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: List all scripts
    post:
      operationId: createScript
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScriptMutateBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScriptView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Create a script
  /api/picotera/scripts/delete:
    post:
      operationId: deleteScript
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteScriptRequestBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Delete a script
  /api/picotera/scripts/{id}:
    get:
      operationId: getScript
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScriptView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Get a script
    put:
      operationId: updateScript
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScriptMutateBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScriptView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PicoTeraError"
          description: Error
      summary: Update a script

